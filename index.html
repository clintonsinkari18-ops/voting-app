  <body>
    <div id="root"></div>
    <script type="module">
      import { db } from './firebase.js';
      import { collection, addDoc } from 'firebase/firestore';

      try {
        const docRef = await addDoc(collection(db, "visits"), {
          timestamp: new Date()
        });
        console.log("Connection to Firebase successful. A test document was written to the 'visits' collection with ID: ", docRef.id);
      } catch (e) {
        console.error("Error adding document: ", e);
      }
    </script>
